server:
  port: 19091

spring:
  config:
    import: optional:file:./.env[.properties]
  application:
    name: api-gateway
  main:
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:19092
              predicates:
                - Path=/api/v1/auth/**, /api/v1/user/**, /internal/v1/user/**
              # filters가 없으면 아예 생략해도 됨

            - id: limited-product-service
              uri: lb://limited-product-service
              predicates:
                - Path=/api/v1/limited-products/**, /internal/v1/limited-products/**

            - id: resell-product-service
              uri: lb://resell-product-service
              predicates:
                - Path=/api/v1/resell-product/**, /internal/v1/resell-products/**

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/orders/**, /internal/v1/orders/**, /api/v1/carts/**

            - id: payments-service
              uri: lb://payments-service
              predicates:
                - Path=/api/v1/payments/**, /internal/v1/payments/**

          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  level:
    com.netflix.discovery: DEBUG
    org.springframework.cloud.netflix.eureka: DEBUG

security:
  master-key: ${SECURITY_MASTER_KEY}
  jwt:
    secret-key: ${SECURITY_JWT_SECRET_KEY}
    access-token-expire-minutes: 30
