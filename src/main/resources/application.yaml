server:
  port: 19091

spring:
  config:
    import: optional:file:./.env[.properties]
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:19092
          predicates:
            - Path=/api/v1/auth/**
          filters:
          #  - StripPrefix=1   # 필요하면 주석
        - id: limited-product-service
          uri: lb://limited-product-service
          predicates:
            - Path=/api/v1/limited-products/**
            - Path=/internal/v1/limited-products/**
          filters:
        - id: resell-product-service
          uri: lb://resell-product-service
          predicates:
            - Path=/api/v1/resell-products
            - Path=/internal/v1/resell-products
          filters:
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders
          filters:
        - id: payments-service
          uri: lb://payments-service
          predicates:
            - Path=/api/v1/payments/**
            - Path=/internal/v1/payments/**
          filters:

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/
    fetch-registry: true
  instance:
    prefer-ip-address: true


logging:
  level:
    com.netflix.discovery: DEBUG
    org.springframework.cloud.netflix.eureka: DEBUG

security:
  jwt:
    secret-key: "N2Y5ZDgzNzMwZTU1ODFkMGNhNjE4YzY2YmI3M2ZlYmQ="
    access-token-expire-minutes: 30